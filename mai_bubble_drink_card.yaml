    entity: sensor.mai_mvadt_caffeine
    name: Caffeine hôm nay
    show_state: true
    icon: mdi:chart-bar
    card_layout: normal
    styles: |-
      :host {
        --color-main: #1a1a2e;
        --color-second: #16213e;
        --color-off: #aaaaaa;
      }
      .bubble-button-background {
        background: linear-gradient(45deg,
          var(--color-main) 0%,
