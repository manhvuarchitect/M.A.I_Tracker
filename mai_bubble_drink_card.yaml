            perform_action: mai_drink_tracker.log
            data: {loai: tra, luong_ml: 250}
        - name: "+500"
          icon: mdi:tea
          show_name: true
          tap_action:
            action: perform-action
            perform_action: mai_drink_tracker.log
            data: {loai: tra, luong_ml: 500}
        - icon: mdi:undo
