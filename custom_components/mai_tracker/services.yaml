log_drink:
  name: Log Drink (Ghi nhận đồ uống)
  description: >
    Record a drink for a person. Target the device or
    one of its sensors.
  target:
    entity:
      integration: mai_tracker
  fields:
    loai:
      name: Loại đồ uống
      description: Loại đồ uống (nuoc_loc, cafe, tra, nuoc_ngot, sua, bia, ruou).
      required: true
      selector:
        text:
    luong_ml:
      name: Lượng (ml)
      description: Lượng đồ uống tính bằng ml.
      required: true
      selector:
        number:
          min: 1
          max: 2000
          step: 50
          unit_of_measurement: ml
    timestamp:
      name: Timestamp
      description: >
        Optional ISO 8601 datetime. Defaults to now.
      required: false
      selector:
        text:

remove_last_consumption:
  name: Remove Last Consumption
  description: Undo the most recent caffeine event for this person.
  target:
    entity:
      integration: mai_tracker

remove_consumption:
  name: Remove Consumption by ID
  description: Remove a specific caffeine event by its ID.
  target:
    entity:
      integration: mai_tracker
  fields:
    event_id:
      name: Event ID
      description: >
        The UUID of the event to remove. IDs are listed in the
        `events` attribute of the caffeine-level sensor.
      required: true
      selector:
        text:

clear_today:
  name: Clear Today
  description: Remove all caffeine events logged since local midnight.
  target:
    entity:
      integration: mai_tracker
